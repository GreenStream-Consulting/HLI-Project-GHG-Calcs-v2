name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install pkg
        run: npm install -g pkg

      - name: Build EXE
        run: pkg index.js --targets node18-win-x64 --output HLI_Project_GHG_Calcs_Builder.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          name: HLI-App
          path: HLI_Project_GHG_Calcs_Builder.exe
