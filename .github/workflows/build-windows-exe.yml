name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name HLI_Project_GHG_Calcs_Builder hli_project_ghg_calcs_builder.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HLI_Project_GHG_Calcs_Builder
          path: dist/HLI_Project_GHG_Calcs_Builder.exe
